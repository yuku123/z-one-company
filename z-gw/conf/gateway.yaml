# Z-GW Gateway Configuration

server:
  port: 8080
  bossThreads: 1
  workerThreads: 0  # 0 = use Netty default (CPU cores * 2)
  soBacklog: 1024
  soKeepalive: true
  tcpNodelay: true
  maxContentLength: 10485760  # 10MB

router:
  routes:
    # === 内部服务路由 ===
    # z-ctc 认证中心
    - id: ctc-service
      path: /api/ctc/**
      method: "*"
      backend: http://localhost:8092
      stripPrefix: true

    # z-wf 审批中心
    - id: wf-service
      path: /api/wf/**
      method: "*"
      backend: http://localhost:8091
      stripPrefix: true

    # z-task 任务中心
    - id: task-service
      path: /api/task/**
      method: "*"
      backend: http://localhost:8090
      stripPrefix: true

    # z-config 配置中心
    - id: config-service
      path: /api/config/**
      method: "*"
      backend: http://localhost:8848
      stripPrefix: true

    # z-mist 密钥中心
    - id: mist-service
      path: /api/mist/**
      method: "*"
      backend: http://localhost:8085
      stripPrefix: true

    # z-meta 元数据中心
    - id: meta-service
      path: /api/meta/**
      method: "*"
      backend: http://localhost:8093
      stripPrefix: true
