# Z-GW Gateway Configuration

server:
  port: 8080
  bossThreads: 1
  workerThreads: 0  # 0 = use Netty default (CPU cores * 2)
  soBacklog: 1024
  soKeepalive: true
  tcpNodelay: true
  maxContentLength: 10485760  # 10MB

router:
  routes:
    # Example routes
    - id: user-service
      path: /api/users/**
      method: "*"
      backend: http://localhost:8081
      stripPrefix: true

    - id: order-service
      path: /api/orders/**
      method: "*"
      backend: http://localhost:8082
      stripPrefix: true

    - id: product-service
      path: /api/products/**
      method: "*"
      backend: http://localhost:8083
      stripPrefix: true