server:
  port: 8080
  servlet:
    context-path: /schedule

spring:
  application:
    name: z-schedule-admin
  actuator:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: always

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://rm-bp108uqlgwn712k54ho.mysql.rds.aliyuncs.com:3306/oc?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: zifang
    password: Hhzemol!
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

# Z-Schedule配置
zschedule:
  # 调度中心配置
  admin:
    # 调度中心地址
    addresses: http://localhost:8080/schedule

  # 执行器配置
  executor:
    # 执行器AppName
    appname: z-schedule-executor
    # 执行器注册地址（为空则自动获取）
    ip:
    # 执行器端口（为空则随机端口）
    port: 9999
    # 执行器日志路径
    logpath: /data/applogs/z-schedule/jobhandler
    # 执行器日志保留天数
    logretentiondays: 30

  # 调度中心集群配置
  cluster:
    # 是否开启集群
    enabled: false
    # 集群节点列表

# 日志配置
logging:
  level:
    root: info
    com.zifang.z.schedule: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /data/applogs/z-schedule/admin/z-schedule-admin.log