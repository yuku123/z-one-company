version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: z-schedule-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: z_job
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./doc/sql/init_tables.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - z-schedule-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Z-Job 主应用（前端+后端）
  z-schedule:
    build:
      context: ..
      dockerfile: Dockerfile
    image: z-schedule:latest
    container_name: z-schedule-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/z_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      # JVM 参数
      JAVA_OPTS: "-Xms512m -Xmx512m -XX:+UseG1GC"
    ports:
      - "80:80"      # 前端访问端口
      - "8080:8080"  # 后端API端口
    volumes:
      - z_job_logs:/var/log/z-schedule
      - z_job_data:/data
    networks:
      - z-schedule-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/z-schedule-admin/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

  # （可选）单独的 Nginx 反向代理
  # 如果需要更复杂的负载均衡，可以启用此服务
  # nginx:
  #   image: nginx:alpine
  #   container_name: z-schedule-nginx
  #   restart: always
  #   depends_on:
  #     - z-schedule
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ./docker/nginx/ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - z-schedule-network

volumes:
  mysql_data:
    driver: local
  z_job_logs:
    driver: local
  z_job_data:
    driver: local

networks:
  z-schedule-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
