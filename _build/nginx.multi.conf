# 多容器模式 Nginx 配置
# 用于未来独立部署多个服务时使用

upstream z-config {
    server z-config:8888;
}

upstream z-ctc {
    server z-ctc:8888;
}

upstream z-wf {
    server z-wf:8888;
}

server {
    listen 80;
    server_name localhost;

    # 前端
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 各服务路由
    location /config/ {
        proxy_pass http://z-config/;
        proxy_set_header Host $host;
        rewrite ^/config/(.*) /$1 break;
    }

    location /ctc/ {
        proxy_pass http://z-ctc/;
        proxy_set_header Host $host;
        rewrite ^/ctc/(.*) /$1 break;
    }

    location /wf/ {
        proxy_pass http://z-wf/;
        proxy_set_header Host $host;
        rewrite ^/wf/(.*) /$1 break;
    }

    # API 文档
    location /doc.html {
        proxy_pass http://z-config/doc.html;
        proxy_set_header Host $host;
    }
}