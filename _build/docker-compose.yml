version: '3.8'

services:
  # 前端 nginx 服务
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../z-one-company-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/http.d/default.conf:ro
    # 删除默认配置
    command: sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app

  # 后端 Java 应用
  app:
    build:
      context: ..
      dockerfile: _build/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8888:8888"