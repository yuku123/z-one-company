server:
  port: 8080

spring:
  application:
    name: z-task

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://rm-bp108uqlgwn712k54ho.mysql.rds.aliyuncs.com:3306/oc?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: zifang
    password: Hhzemol!
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zifang.z.task.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

# SSO 配置
sso:
  # zb-ctc 登录页地址
  login-url: http://localhost:8080/ctc/login
  # Token Cookie 名称
  token-cookie-name: ctc_token
  # 拦截的路径模式
  intercept-paths:
    - /**
  # 排除路径
  exclude-paths:
    - /api/v1/public/**
    - /swagger-ui/**
    - /v3/api-docs/**
    - /doc.html
    - /webjars/**
  # Token 验证服务地址 (使用远程验证)
  auth-server-url: http://localhost:8080/ctc/api/auth/verify

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
